        :root {

            :root {

        #my-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--preloader-bg-color);
            z-index: 99999;

            justify-content: center;
            align-items: center;

            transition: opacity 0.7s ease-in-out;
        }

         
        .loader-container {
            position: relative; 
            width: 120px;  
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

         
        .loader-spinner {
            position: absolute;
            width: 100%;
            height: 100%;
             
            animation: spin 1.5s linear infinite; 
        }

         
        .spinner-path {
            fill: none;  
            stroke: var(--preloader-ring-color);  
            stroke-width: 6;  
            stroke-linecap: round;  
            
             
            stroke-dasharray: 352; 
            stroke-dashoffset: 120;  
            
             
            transition: stroke-dashoffset 0.5s ease-in-out; 
        }

         
        .loader-spinner.closing .spinner-path {
            stroke-dashoffset: 0; 
        }

         
        .loader-logo {
            position: absolute;
            width: 60px; 
            height: 60px;
            z-index: 2; 
        }

         
        @media (prefers-color-scheme: dark) {
            .loader-logo {

    <script>
        
        const startTime = Date.now();

        window.addEventListener('load', function() {
            
            const elapsedTime = Date.now() - startTime;
            
            
            
            const minimumDisplayTime = 1200; 
            
            
            
            const delayTime = Math.max(0, minimumDisplayTime - elapsedTime);

            
            setTimeout(function() {
                const preloader = document.getElementById('my-preloader');
                
                const spinner = document.querySelector('.loader-spinner');
                
                
                
                spinner.classList.add('closing');
                
                
                
                setTimeout(function() {
                    preloader.style.opacity = '0';
                    
                    
                    
                    setTimeout(function() {
                        preloader.style.display = 'none';
                    }, 700); 

                }, 400); 

            }, delayTime);
        });
    </script>

<script>
// 等待网页内容加载完毕后再施展魔法
document.addEventListener("DOMContentLoaded", function() {
    const gallery = document.querySelector('.masonry-gallery');
    if (!gallery) return;

    // 获取相册里的所有图片项
    const items = Array.from(gallery.children);

    // 洗牌魔法：随机打乱这些图片的顺序
    for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        // 交换位置
        [items[i], items[j]] = [items[j], items[i]];
    }

    // 按照新的随机顺序，把图片重新放回相册里
    items.forEach(item => gallery.appendChild(item));
});
</script>
