    <style>
         
        :root {

        #my-preloader {
            position: fixed;

            position: relative; 
            width: 120px;  
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

         
        .loader-spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid transparent; 
            border-top: 5px solid var(--preloader-ring-color);
            border-right: 5px solid var(--preloader-ring-color);
            border-radius: 50%; 
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }

         
        .loader-logo {
            position: absolute;
            width: 60px; 
            height: 60px;
            z-index: 2; 
        }

         
        @media (prefers-color-scheme: dark) {
            .loader-logo {

    <script>
        
        const startTime = Date.now();

        window.addEventListener('load', function() {
            
            const elapsedTime = Date.now() - startTime;
            const preloader = document.getElementById('my-preloader');
            
            
            if (elapsedTime < 600) {
                
                preloader.style.transition = 'none'; 
                preloader.style.opacity = '0';
                preloader.style.display = 'none';
            } else {
                
                preloader.style.opacity = '0';
                setTimeout(function() {
                    preloader.style.display = 'none';
                }, 600); 
            }
        });
    </script>
