  transition: color 0.3s ease; /* 加个小魔法：切换黑白模式时，颜色会有0.3秒的渐变动画，极其丝滑 */
}

/* 2. 当用户系统是暗黑模式时（黑底 / Dark Mode），自动变成白色 */
@media (prefers-color-scheme: dark) {
  h1 {
    color: #ffffff !important; /* 加上 !important 就像给代码发了 VIP 通行证，强制生效 */
  }
}

/* 3. 针对 Hugo Paige 主题的防弹装甲（防止手动点击主题按钮时颜色没变） */
[data-bs-theme="dark"] h1, 
[data-theme="dark"] h1 {
  color: #ffffff !important;
}
  
 /* 2. 核心：瀑布流外层容器 (Masonry Container) */
  .masonry-gallery {
    /* 电脑端默认分 4 列 */
    column-count: 4;
    /* 列与列之间的呼吸感间距 */
    column-gap: 30px; 
    max-width: 1200px; 
    margin: 40px auto; /* 居中显示 */
    padding: 0 20px;
  }

  /* 3. 图片的自我修养：不裁剪、不断裂 */
  .masonry-gallery img {
    width: 100%;       /* 宽度占满当前列 */
    height: auto;      /* ⭐️ 核心魔法：高度自适应！绝不裁剪任何一丝一毫！ */
    display: block;
    margin-bottom: 30px; /* 上下照片的间距，和 column-gap 保持一致 */
    border-radius: 0px;  /* 可选：加一点极微小的圆角，质感更温润 */
    
    /* ⭐️ 防坑指南：防止一张图片被从中间劈开，分到两列去 */
    break-inside: avoid; 
    -webkit-column-break-inside: avoid;
    
    /* 一点点极简的交互：鼠标放上去微微发光 */
    transition: filter 0.3s ease;
  }
  
  .masonry-gallery img:hover {
    filter: brightness(1.05); /* 鼠标悬停稍微变亮一点，高级感拉满 */
  }

  /* 4. 响应式布局：照顾手机和平板用户 (Mobile Friendly) */
  @media (max-width: 800px) {
    .masonry-gallery { column-count: 3; } /* 平板变成 2 列 */
  }
  @media (max-width: 500px) {
    .masonry-gallery { column-count: 2; } /* 手机乖乖变成 1 列大图 */
  }
