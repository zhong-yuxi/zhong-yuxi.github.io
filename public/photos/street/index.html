    <style>
         
        :root {
            --preloader-bg-color: #F7FDFF;

        }

         
        @media (prefers-color-scheme: dark) {
            :root {
                --preloader-bg-color: #00233B;
                --preloader-ring-color: #E8F6FF;
            }
        }

         
        #my-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--preloader-bg-color);
            z-index: 99999; 
            display: flex;
            justify-content: center;
            align-items: center;
            
             
            opacity: 1;  
             
            transition: opacity 0.7s ease-in-out;
        }

         
        .loader-container {
            position: relative; 
            width: 120px;  
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

         
        .loader-spinner {
            position: absolute;
            width: 100%;
            height: 100%;
             
            animation: spin 1.5s linear infinite; 
        }

         
        .spinner-path {
            fill: none;  
            stroke: var(--preloader-ring-color);  
            stroke-width: 6;  
            stroke-linecap: round;  
            
             
            stroke-dasharray: 352; 
            stroke-dashoffset: 120;  
            
             
            transition: stroke-dashoffset 0.5s ease-in-out; 
        }

         
        .loader-spinner.closing .spinner-path {
            stroke-dashoffset: 0; 
        }

         
        .loader-logo {
            position: absolute;
            width: 60px; 
            height: 60px;
            z-index: 2; 
        }

         
        @media (prefers-color-scheme: dark) {
            .loader-logo {
                 
                filter: brightness(0) invert(1);
        }
    }

    <script>
        
        const startTime = Date.now();

        window.addEventListener('load', function() {
            
            const elapsedTime = Date.now() - startTime;
            
            
            
            const minimumDisplayTime = 1200; 
            
            
            
            const delayTime = Math.max(0, minimumDisplayTime - elapsedTime);

            
            setTimeout(function() {
                const preloader = document.getElementById('my-preloader');
                
                const spinner = document.querySelector('.loader-spinner');
                
                
                
                spinner.classList.add('closing');
                
                
                
                setTimeout(function() {
                    preloader.style.opacity = '0';
                    
                    
                    
                    setTimeout(function() {
                        preloader.style.display = 'none';
                    }, 700); 

                }, 400); 

            }, delayTime);
        });
    </script>

<script>
// 1. 控制画廊左右滑动的魔法
function scrollGallery(direction) {
const track = document.getElementById('street-track');
// 每次点击滑动 400 像素，你可以自己微调这个数字
const scrollAmount = 400; 
track.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
}

// 2. 点击照片，激活高级放大层的魔法
function openSpotlight(imgSrc, idText, descText) {
document.getElementById('spotlight-img').src = imgSrc;
document.getElementById('spotlight-id').innerHTML = idText;
document.getElementById('spotlight-desc').innerHTML = descText;
document.getElementById('spotlight-modal').classList.add('active');
}

// 3. 点击背景空白处，关闭放大层
function closeSpotlight() {
document.getElementById('spotlight-modal').classList.remove('active');
}
</script>
