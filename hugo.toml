baseURL = "https://zhong-yuxi.github.io/"
defaultContentLanguage = "en" # 新加这一行，确立英文的主导地位
enablerobotstxt = true
timezone = "Asia/Shanghai"
titlecasestyle = "Go"

[languages.en]
copyright = "© 2026 Yuxi Zhong"
languagecode = "en-us"
languagedirection = "ltr"
languagename = "English"
title = "YUXI ZHONG"
weight = 10

[languages.en.params.paige.site]
description = "Material, Tibet, Cat"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noclasses = false
style = "github"

[[module.imports]]
path = "github.com/willfaught/paige"

[outputs]
home = ["atom", "html", "paige-search", "rss"]
section = ["atom", "html", "rss"]
taxonomy = ["atom", "html", "rss"]
term = ["atom", "html", "rss"]

[pagination]
pagersize = 50

[[params.paige.feeds.atom.authors]]
email = "yuxi.zhonggg@gmail.com"
name = "Yuxi Zhong"
url = "https://zhong-yuxi.github.io/"

[params.paige.feeds.rss]
managing_editor = "yuxi.zhonggg@gmail.com (Yuxi Zhong)"
web_master = "yuxi.zhonggg@gmail.com (Yuxi Zhong)"

[params.paige.pages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_next = true
disable_prev = true
disable_reading_time = true
disable_series = true
disable_toc = true
disable_word_count = true
maximize_heading_levels = true
normalize_heading_levels = true

[paige.pages.base_schema]
isAccessibleForFree = true
isFamilyFriendly = true

[params.paige.site]
disable_breadcrumbs = true
disable_credit = true

[params.paige.subpages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_reading_time = true
disable_series = true
disable_summary = true
disable_word_count = true

[taxonomies]
category = "categories"
series = "series"
tag = "tags"

# ----------------------------------------------------------------------------
# 导航栏手动菜单配置 (手动定义以覆盖默认文件夹抓取)
# ----------------------------------------------------------------------------

[[languages.en.menu.main]]
    name = "ABOUT"
    url = "/"
    weight = 1


[[languages.en.menu.main]]
    name = "PROJECTS"
    url = "/projects/"
    weight = 2

[[languages.en.menu.main]]
    name = "PHOTOS"
    url = "/photos/"
    weight = 3

[[languages.en.menu.main]]
    name = "VIDEOS"
    url = "/videos/"
    weight = 4

[[languages.en.menu.main]]
    name = "SERIES"
    url = "/series/"
    weight = 5


[[languages.en.menu.main]]
    name = "TAGS"
    url = "/tags/"
    weight = 6

# ============================================================================
# 中文平行宇宙 (Chinese Configuration)
# ============================================================================

[languages.zh]
copyright = "© 2026 Yuxi Zhong" 
languagecode = "zh-cn"
languagedirection = "ltr"
languagename = "中文" # 语言切换器里显示的文字
title = "钟誉熙" # 这里也可以换成你的中文名
weight = 20 # 权重比英文的10大，所以英文排前面，中文排后面

[languages.zh.params.paige.site]
description = "物质文化、西藏、猫、灶" # 把 Material, Tibet, Cat 翻译过来啦

# ----------------------------------------------------------------------------
# 导航栏中文菜单
# ----------------------------------------------------------------------------

[[languages.zh.menu.main]]
    name = "自述"
    url = "/zh/" # 注意：中文页面的路径会自动带上 /zh/ 前缀
    weight = 1

[[languages.zh.menu.main]]
    name = "探索"
    url = "/zh/projects/"
    weight = 2

[[languages.zh.menu.main]]
    name = "光影"
    url = "/zh/photos/"
    weight = 3

[[languages.zh.menu.main]]
    name = "纪行"
    url = "/zh/videos/"
    weight = 4

[[languages.zh.menu.main]]
    name = "系列"
    url = "/zh/series/"
    weight = 5

[[languages.zh.menu.main]]
    name = "标签"
    url = "/zh/tags/"
    weight = 6