baseURL = "https://zhong-yuxi.github.io/"
enablerobotstxt = true
timezone = "America/Los_Angeles"
titlecasestyle = "Go"

[languages.en]
copyright = "© 2026 Yuxi Zhong"
languagecode = "en-us"
languagedirection = "ltr"
languagename = "English"
title = "YUXI ZHONG"
weight = 10

[languages.en.params.paige.site]
description = "Material, Tibet, Cat"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noclasses = false
style = "github"

[[module.imports]]
path = "github.com/willfaught/paige"

[outputs]
home = ["atom", "html", "paige-search", "rss"]
section = ["atom", "html", "rss"]
taxonomy = ["atom", "html", "rss"]
term = ["atom", "html", "rss"]

[pagination]
pagersize = 50

[[params.paige.feeds.atom.authors]]
email = "yuxi.zhonggg@gmail.com"
name = "Yuxi Zhong"
url = "https://zhong-yuxi.github.io/"

[params.paige.feeds.rss]
managing_editor = "yuxi.zhonggg@gmail.com (Yuxi Zhong)"
web_master = "yuxi.zhonggg@gmail.com (Yuxi Zhong)"

[params.paige.pages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_next = true
disable_prev = true
disable_reading_time = true
disable_series = true
disable_toc = true
disable_word_count = true
maximize_heading_levels = true
normalize_heading_levels = true

[paige.pages.base_schema]
isAccessibleForFree = true
isFamilyFriendly = true

[params.paige.site]
disable_breadcrumbs = true
disable_credit = true

[params.paige.subpages]
disable_authors = true
disable_date = true
disable_keywords = true
disable_reading_time = true
disable_series = true
disable_summary = true
disable_word_count = true

[taxonomies]
category = "categories"
series = "series"
tag = "tags"

